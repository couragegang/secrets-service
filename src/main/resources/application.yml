micronaut:
  application:
    name: secrets-service
  server:
    port: 8087
    context-path: /v1/secrets
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true

endpoints:
  health:
    enabled: true
    sensitive: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    sensitive: false
    path: metrics

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secrets}
    username: ${DB_USER:secrets}
    password: ${DB_PASSWORD:secrets}
    driver-class-name: org.postgresql.Driver

flyway:
  datasources:
    default:
      enabled: true

secrets-service:
  internal-api-key: ${SECRETS_INTERNAL_API_KEY:dev-internal-key}
  encryption-key: ${SECRETS_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}
