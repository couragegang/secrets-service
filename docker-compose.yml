services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: secrets
      POSTGRES_PASSWORD: secrets
      POSTGRES_DB: secrets
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secrets"]
      interval: 3s
      timeout: 3s
      retries: 10

  secrets:
    build: .
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: secrets
      DB_USER: secrets
      DB_PASSWORD: secrets
      SECRETS_INTERNAL_API_KEY: dev-internal-key
      SECRETS_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
    depends_on:
      postgres:
        condition: service_healthy
